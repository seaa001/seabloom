<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sea Bloom</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* --- IMPORT GOOGLE FONTS --- */
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');

:root{
/* Vintage Pastel Palette */
--bg-paper: #F4EFE6;
--vintage-green: #9CB4A1;
--vintage-pink: #D9A098;
--vintage-brown: #5C4A3D;
--vintage-cream: #FFFBF2;
--shadow-color: #8C7A6B;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family: 'Fredoka', sans-serif;
background:var(--bg-paper);
color:var(--vintage-brown);
height:100vh;
overflow:hidden;
transition: background 0.5s ease;
}

h1, h2, h3, .logo {
font-family: 'Playfair Display', serif;
letter-spacing: 0.5px;
}

/* --- SPLASH SCREEN --- */
#splash-screen {
position:fixed;
inset:0;
background:var(--bg-paper);
background-image: radial-gradient(var(--vintage-cream) 2px, transparent 2px);
background-size: 24px 24px;
z-index:99999; 
display:flex;
flex-direction: column;
align-items:center;
justify-content:center;
transition:opacity 0.8s ease;
}
.splash-text {
position:absolute;
font-size:42px;
color:var(--vintage-brown);
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
text-align:center;
text-shadow: 2px 2px 0 var(--vintage-green);
}
.splash-text.active { opacity:1; transform:translateY(0); }

/* --- MAIN APP --- */
header{
height:75px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
background:var(--vintage-cream);
border-bottom:3px solid var(--vintage-brown);
box-shadow: 0 4px 0 rgba(92, 74, 61, 0.1);
z-index: 100;
position: relative;
}
.logo{font-size:30px;font-weight:700; flex-shrink:0;} 
.logo span{color:var(--vintage-green); font-style: italic;}

.topmenu{display:flex;gap:12px; overflow-x:auto; padding-bottom:5px; scrollbar-width: none;}
.topmenu::-webkit-scrollbar { display: none; }
.menu-btn{
background:var(--vintage-cream);
border:2px solid var(--vintage-brown);
padding:10px 18px;
border-radius:25px;
cursor:pointer;
font-size: 15px;
font-weight: 500;
color: var(--vintage-brown);
box-shadow: 2px 3px 0 var(--shadow-color);
opacity: 0.6;
transition: all 0.2s;
font-family: 'Fredoka', sans-serif;
white-space: nowrap;
}
.menu-btn:hover { opacity: 0.8; }
.menu-btn.active {
background:var(--vintage-green);
color:var(--vintage-cream);
opacity: 1;
font-weight:600;
box-shadow: 0px 0px 0 var(--shadow-color); 
transform: translateY(3px) translateX(2px);
}

.layout{
display:grid;
grid-template-columns:300px 1fr 260px;
height:calc(100vh - 75px);
transition: all 0.5s ease;
}

.assets, .layers {
background:var(--vintage-cream);
padding:20px;
overflow:auto;
display:flex;
flex-direction:column;
}
.assets { border-right:3px solid var(--vintage-brown); }
.layers { border-left:3px solid var(--vintage-brown); }

.workspace-wrap{
padding:25px;
background: var(--bg-paper);
background-image: radial-gradient(#d6c9b8 1.5px, transparent 1.5px);
background-size: 20px 20px;
transition: all 0.5s ease;
display: flex;
flex-direction: column;
align-items: center;
position: relative;
overflow: hidden;
}
.workspace{
position:relative;
width: 100%;
height: calc(100% - 60px);
background:var(--vintage-cream);
border-radius:24px;
border:4px dashed var(--vintage-pink);
overflow:hidden;
transition: all 0.5s ease;
box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
}

/* Custom Message Input (Changed to div for better rendering) */
#custom-message {
position: absolute;
top: 15%;
left: 50%;
transform: translateX(-50%);
font-family: 'Playfair Display', serif;
font-size: 36px;
color: var(--vintage-brown);
background: transparent;
border: none;
outline: none;
text-align: center;
z-index: 9999;
display: none;
width: 90%;
font-style: italic;
text-shadow: 1px 1px 0px var(--vintage-cream);
padding: 10px; /* Prevents text cutoff */
line-height: 1.4;
cursor: text;
}
#custom-message:empty:before {
content: attr(data-placeholder);
color: rgba(92, 74, 61, 0.4);
}

.section{
margin-bottom:20px;
display:none; 
flex: 1;
}
.section.active { display:block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.section h3{
margin-bottom:15px;
font-size: 22px;
color: var(--vintage-brown);
border-bottom: 2px solid var(--vintage-green);
display: inline-block;
padding-bottom: 5px;
}

.asset-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
.asset{
padding:12px;
background:var(--bg-paper);
border-radius:16px;
cursor:pointer;
text-align:center;
border:2px solid var(--vintage-brown);
box-shadow: 2px 3px 0 var(--shadow-color);
transition: transform 0.1s;
font-weight: 500;
font-size: 14px;
/* Make it noticeable on mobile that it can be tapped */
-webkit-tap-highlight-color: transparent; 
}
.asset:active { transform: translate(2px, 2px); box-shadow: 0 0 0 transparent; }
.asset img{ width:65px; height:65px; object-fit:contain; margin-bottom: 5px; pointer-events: none;}

.item{
position:absolute;
width:120px;
cursor:move;
z-index: 10; 
transition: opacity 0.2s;
touch-action: none; /* Crucial for mobile drag */
}
.selected{ filter: drop-shadow(0px 0px 8px var(--vintage-pink)); }

/* Layer Items */
.layer-item{
padding:10px 15px;
background:var(--bg-paper);
margin-bottom:10px;
border-radius:12px;
font-size:14px;
font-weight: 500;
border: 2px solid var(--vintage-brown);
box-shadow: 1px 2px 0 var(--shadow-color);
cursor: grab;
display: flex;
align-items: center;
justify-content: space-between;
transition: all 0.2s;
}
.layer-item:active { cursor: grabbing; }

.active-layer {
background: var(--vintage-pink) !important;
color: var(--vintage-cream);
border-color: var(--vintage-brown) !important;
transform: scale(1.02);
}

/* --- TOOLBAR --- */
.toolbar{
margin-top: 15px;
display:none;
flex-wrap: wrap;
justify-content: center;
gap:8px;
background:var(--vintage-cream);
padding:10px 18px;
border-radius:25px;
border: 3px solid var(--vintage-brown);
box-shadow: 3px 3px 0 var(--shadow-color);
z-index: 9999;
width: max-content;
max-width: 100%;
}
.toolbar button{
border:2px solid transparent;
background: transparent;
padding:6px 10px;
border-radius:10px;
cursor:pointer;
font-weight: 600;
font-family: 'Fredoka', sans-serif;
color: var(--vintage-brown);
transition: 0.2s;
font-size: 13px;
}
.toolbar button:hover { background: var(--vintage-green); color: var(--vintage-cream); border-color: var(--vintage-brown); }

.next-btn, .action-btn {
margin-top:20px;
width:100%;
padding:14px;
border:2px solid var(--vintage-brown);
border-radius:20px;
cursor:pointer;
font-weight:600;
font-family: 'Fredoka', sans-serif;
font-size: 16px;
box-shadow: 3px 4px 0 var(--shadow-color);
transition: all 0.2s;
}
.next-btn:active, .action-btn:active { transform: translate(3px, 4px); box-shadow: none; }
.next-btn { background:var(--vintage-brown); color:var(--vintage-cream); }
.btn-primary { background:var(--vintage-pink); color:var(--vintage-brown); }
.btn-success { background:var(--vintage-green); color:var(--vintage-cream); }
.btn-danger { background:#E27B7B; color:var(--vintage-cream); margin-top:10px; }

/* --- PREVIEW MODE (COMPACT FIX) --- */
body.preview-mode header,
body.preview-mode .assets,
body.preview-mode .layers,
body.preview-mode .toolbar { display: none !important; }
body.preview-mode .layout { grid-template-columns: 1fr; height: 100vh; display: flex; }
body.preview-mode .workspace-wrap {
    background: var(--bg-paper); 
    background-image: none; 
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
}
body.preview-mode .workspace {
    border: none; 
    background: var(--vintage-cream); 
    box-shadow: 0 10px 30px rgba(0,0,0,0.05); /* Adds a nice card shadow */
    width: 100%;
    max-width: 450px; /* Forces a compact, shareable size */
    height: 100%;
    max-height: 600px;
    border-radius: 20px; /* Soft edges for the card */
}
body.preview-mode .item { cursor: grab !important; }
body.preview-mode .item:active { cursor: grabbing !important; }

#final-actions {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 15px;
    z-index: 10000;
    width: max-content;
}
body.preview-mode #final-actions { display: flex; flex-wrap: wrap; justify-content: center;}
.final-btn {
    padding: 14px 24px;
    font-size: 16px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    border: 3px solid var(--vintage-brown);
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 4px 5px 0 var(--shadow-color);
    transition: all 0.2s;
}
.final-btn:active { transform: translate(4px, 5px); box-shadow: none; }
.btn-download { background: var(--vintage-pink); color: var(--vintage-brown); }
.btn-back { background: var(--vintage-cream); color: var(--vintage-brown); }
.btn-clear { background: #E27B7B; color: var(--vintage-cream); }

/* --- MOBILE RESPONSIVENESS --- */
@media (max-width: 800px) {
    body { overflow-y: auto; }
    header { padding: 0 15px; height: 70px; }
    .layout {
        display: flex;
        flex-direction: column;
        height: auto;
    }
    .workspace-wrap {
        order: -1; /* Put workspace at the top on mobile */
        height: 60vh; /* Fixed height for interaction */
        padding: 15px;
    }
    .workspace { border-width: 3px; }
    .assets, .layers {
        border: none;
        padding: 15px;
        overflow: visible;
    }
    .assets { border-bottom: 3px solid var(--vintage-brown); }
}
</style>
</head>
<body>

<div id="splash-screen">
    <div id="splash-1" class="splash-text">Sea Bloom 🌸</div>
    <div id="splash-2" class="splash-text">Start Arranging...</div>
</div>

<header>
<div class="logo">Sea <span>Bloom</span></div>
<div class="topmenu">
<button class="menu-btn" id="nav-flowers" onclick="goToStep('flowers')">1. 🌷 Flowers</button>
<button class="menu-btn" id="nav-fillers" onclick="goToStep('fillers')">2. 🌿 Fillers</button>
<button class="menu-btn" id="nav-wrapping" onclick="goToStep('wrapping')">3. 📦 Wrapping</button>
<button class="menu-btn" id="nav-accessories" onclick="goToStep('accessories')">4. 🎀 Accessories</button>
</div>
</header>

<div class="layout">
<div class="assets">
    <div class="section" id="sec-flowers">
        <h3>Main Flowers</h3>
        <p style="font-size:12px; margin-bottom:10px;">(Drag or tap to add)</p>
        <div class="asset-grid" id="flowers"></div>
        <button class="next-btn" onclick="goToStep('fillers')">Next to Fillers ➡️</button>
    </div>

    <div class="section" id="sec-fillers">
        <h3>Leaves & Fillers</h3>
        <div class="asset-grid" id="fillers"></div>
        <button class="next-btn" onclick="goToStep('wrapping')">Next to Wrapping ➡️</button>
    </div>

    <div class="section" id="sec-wrapping">
        <h3>Wrap Your Bouquet</h3>
        <p style="font-size:14px; margin-bottom:20px; font-weight:500;">Set your arrangement carefully before adding paper!</p>
        
        <div id="wrap-start-ui">
            <button class="action-btn btn-primary" onclick="applyWrapping()">📦 Apply Wrapping</button>
        </div>
        
        <div id="wrap-confirm-ui" style="display:none;">
            <button class="action-btn btn-success" onclick="goToStep('accessories')">✅ Looks Good</button>
            <button class="action-btn btn-danger" onclick="removeWrapping()">🔄 Remove Wrap</button>
        </div>
    </div>

    <div class="section" id="sec-accessories">
        <h3>Final Touches</h3>
        <div class="asset-grid" id="accessories"></div>
        <button class="next-btn" style="background:var(--vintage-green);" onclick="finishBouquet()">Finish Bouquet ✨</button>
    </div>
</div>

<div class="workspace-wrap">
    <div id="workspace" class="workspace">
        <div id="custom-message" contenteditable="true" data-placeholder="Type a sweet message here..." spellcheck="false"></div>
    </div>
    
    <div class="toolbar" id="toolbar">
        <button onclick="mirrorItem()">↔ Mirror</button>
        <button onclick="rotateItem(-15)">↺ L-Rot</button>
        <button onclick="rotateItem(15)">↻ R-Rot</button>
        <button onclick="scaleItem(15)">➕ Size</button>
        <button onclick="scaleItem(-15)">➖ Size</button>
        <button onclick="toggleOpacity()">👻 Fade</button>
        <button onclick="duplicateItem()">📋 Clone</button>
        <button onclick="deleteItem()" style="color:#E27B7B">🗑 Delete</button>
    </div>
</div>

<div class="layers">
<h3>Layer Order</h3>
<p style="font-size:12px; margin-bottom:15px; opacity:0.8;">(Drag layers up or down)</p>
<div id="layers"></div>
</div>

</div>

<div id="final-actions">
    <button class="final-btn btn-back" onclick="editAgain()">⬅️ Edit Current</button>
    <button class="final-btn btn-clear" onclick="startNewBouquet()">🗑️ Start New</button>
    <button class="final-btn btn-download" onclick="saveAsImage()">💾 Save Image</button>
</div>

<script>
// --- SPLASH SCREEN ---
window.addEventListener('load', () => {
    const splashScreen = document.getElementById('splash-screen');
    const splash1 = document.getElementById('splash-1');
    const splash2 = document.getElementById('splash-2');

    setTimeout(() => { splash1.classList.add('active'); }, 300);
    setTimeout(() => {
        splash1.classList.remove('active');
        setTimeout(() => {
            splash2.classList.add('active');
            setTimeout(() => {
                splashScreen.style.opacity = '0';
                setTimeout(() => {
                    splashScreen.style.display = 'none';
                    goToStep('flowers'); 
                }, 800);
            }, 1500);
        }, 600);
    }, 2000);
});

// --- NAVIGATION ---
const steps = ['flowers', 'fillers', 'wrapping', 'accessories'];
function goToStep(stepName) {
    steps.forEach(s => {
        document.getElementById(`sec-${s}`).classList.remove('active');
        document.getElementById(`nav-${s}`).classList.remove('active');
    });
    document.getElementById(`sec-${stepName}`).classList.add('active');
    document.getElementById(`nav-${stepName}`).classList.add('active');
}

// --- ASSETS & WORKSPACE ---
const flowers=['rose','tulip','lily','babybreath','sunflower','daisy','orchid'];
const fillers=['eucalyptus','ruskus','fern','gypsophila'];
const accessories=['ribbon','card','fairylight','charm'];

let selected=null;
let wrappingItem = null; 
let itemCounter = 0; 

function createAssets(list,target,folder){
    const box=document.getElementById(target);
    list.forEach(name=>{
        const el=document.createElement('div');
        el.className='asset';
        el.draggable=true;
        el.innerHTML=`<img src="assets/${folder}/${name}.png"><div>${name}</div>`;
        
        // Tap/Click to add (Mobile Friendly)
        el.onclick = () => addItemToWorkspace(`assets/${folder}/${name}.png`);
        
        // Drag to add (Desktop)
        el.addEventListener('dragstart',e => { e.dataTransfer.setData('src',`assets/${folder}/${name}.png`); });
        box.appendChild(el);
    });
}

createAssets(flowers,'flowers','flowers');
createAssets(fillers,'fillers','fillers');
createAssets(accessories,'accessories','accessories');

const workspace=document.getElementById('workspace');
workspace.addEventListener('dragover',e=>e.preventDefault());
workspace.addEventListener('drop',e=>{
    e.preventDefault();
    const src=e.dataTransfer.getData('src');
    if(!src) return;
    addItemToWorkspace(src, e.offsetX, e.offsetY);
});

// Centralized Add Function
function addItemToWorkspace(src, x, y) {
    itemCounter++;
    const img = document.createElement('img');
    img.src = src;
    img.className = 'item';
    img.dataset.id = 'item-' + itemCounter;
    
    // Default to center if tap/click
    const wsRect = workspace.getBoundingClientRect();
    const startX = x !== undefined ? x : (wsRect.width / 2) - 60;
    const startY = y !== undefined ? y : (wsRect.height / 2) - 60;
    
    img.style.left = startX + 'px';
    img.style.top = startY + 'px';
    
    img.dataset.rotation = 0;
    img.dataset.flip = 1; 
    img.dataset.op = 1; 
    img.style.zIndex = 100 + itemCounter; 

    workspace.appendChild(img);
    makeInteractive(img);
    updateLayers();
}

function highlightLayerUI() {
    document.querySelectorAll('.layer-item').forEach(l => l.classList.remove('active-layer'));
    if(selected) {
        const activeLayer = document.querySelector(`.layer-item[data-ref-id="${selected.dataset.id}"]`);
        if(activeLayer) activeLayer.classList.add('active-layer');
    }
}

function checkToolbar() {
    const toolbar = document.getElementById('toolbar');
    if(selected) toolbar.style.display = 'flex';
    else toolbar.style.display = 'none';
}

function makeInteractive(el){
    // Selection
    const selectItem = (e) => {
        if(document.body.classList.contains('preview-mode')) return; 
        document.querySelectorAll('.item').forEach(x=>x.classList.remove('selected'));
        selected=el;
        el.classList.add('selected');
        highlightLayerUI(); 
        checkToolbar(); 
        e.stopPropagation();
    };
    
    el.addEventListener('mousedown', selectItem);
    el.addEventListener('touchstart', selectItem, {passive: true});

    // Movement Tracking (Mouse + Touch)
    let down = false, ox = 0, oy = 0;
    let pStartX = 0, pStartY = 0; 

    // MOUSE EVENTS
    el.addEventListener('mousedown', e => {
        down = true;
        if(document.body.classList.contains('preview-mode')) {
            pStartX = e.clientX;
            pStartY = e.clientY;
        } else {
            ox = e.offsetX;
            oy = e.offsetY;
        }
    });
    document.addEventListener('mousemove', e => {
        if (!down) return;
        handleMove(e.clientX, e.clientY);
    });
    document.addEventListener('mouseup', () => { down = false; });

    // TOUCH EVENTS (Mobile Drag)
    el.addEventListener('touchstart', e => {
        down = true;
        const touch = e.touches[0];
        if(document.body.classList.contains('preview-mode')) {
            pStartX = touch.clientX;
            pStartY = touch.clientY;
        } else {
            const rect = el.getBoundingClientRect();
            ox = touch.clientX - rect.left;
            oy = touch.clientY - rect.top;
        }
    }, {passive: true});
    document.addEventListener('touchmove', e => {
        if (!down) return;
        const touch = e.touches[0];
        handleMove(touch.clientX, touch.clientY);
    }, {passive: true});
    document.addEventListener('touchend', () => { down = false; });

    // Logic for movement
    function handleMove(clientX, clientY) {
        if (document.body.classList.contains('preview-mode')) {
            let dx = clientX - pStartX;
            let dy = clientY - pStartY;
            pStartX = clientX;
            pStartY = clientY;
            document.querySelectorAll('.item').forEach(it => {
                let currentLeft = it.offsetLeft;
                let currentTop = it.offsetTop;
                it.style.left = (currentLeft + dx) + 'px';
                it.style.top = (currentTop + dy) + 'px';
            });
        } else {
            const rect = workspace.getBoundingClientRect();
            el.style.left = (clientX - rect.left - ox) + 'px';
            el.style.top = (clientY - rect.top - oy) + 'px';
        }
    }

    el.addEventListener('wheel', e => {
        if(document.body.classList.contains('preview-mode')) return;
        e.preventDefault();
        scaleItem(e.deltaY > 0 ? -10 : 10, el);
    });
}

workspace.addEventListener('mousedown', (e) => {
    if(e.target === workspace || e.target.id === 'custom-message') clearSelection();
});
workspace.addEventListener('touchstart', (e) => {
    if(e.target === workspace || e.target.id === 'custom-message') clearSelection();
}, {passive:true});

function clearSelection() {
    if(!document.body.classList.contains('preview-mode')) {
        document.querySelectorAll('.item').forEach(x=>x.classList.remove('selected'));
        selected=null;
        highlightLayerUI();
        checkToolbar();
    }
}

// --- TOOLBAR FUNCTIONS ---
function updateTransform(el) {
    let rot = el.dataset.rotation || 0;
    let flip = el.dataset.flip || 1;
    let isWrap = el === wrappingItem;
    
    let transformStr = '';
    if (isWrap) transformStr += 'translate(-50%, -50%) ';
    transformStr += `rotate(${rot}deg) scaleX(${flip})`;
    el.style.transform = transformStr;
}

function mirrorItem() {
    if(selected) {
        selected.dataset.flip = parseInt(selected.dataset.flip || 1) * -1; 
        updateTransform(selected);
    }
}
function rotateItem(deg) {
    if(selected) {
        selected.dataset.rotation = parseInt(selected.dataset.rotation || 0) + deg;
        updateTransform(selected);
    }
}
function scaleItem(amount, targetItem = selected) {
    if(targetItem) {
        let size = targetItem.offsetWidth + amount;
        if(size < 40) size = 40; 
        targetItem.style.width = size + 'px';
    }
}
function toggleOpacity() {
    if(selected) {
        let op = parseFloat(selected.dataset.op || 1);
        op = (op === 1) ? 0.6 : ((op === 0.6) ? 0.3 : 1); 
        selected.dataset.op = op;
        selected.style.opacity = op;
    }
}
function duplicateItem(){
    if(!selected)return;
    itemCounter++;
    const clone = selected.cloneNode(true);
    clone.dataset.id = 'item-' + itemCounter;
    clone.style.left = (parseInt(selected.style.left || 0) + 30) + 'px';
    clone.style.top = (parseInt(selected.style.top || 0) + 30) + 'px';
    clone.style.zIndex = 100 + itemCounter;
    clone.classList.remove('selected');
    workspace.appendChild(clone);
    makeInteractive(clone);
    updateLayers();
}
function deleteItem(){
    if(selected){
        if(selected === wrappingItem) removeWrapping();
        else selected.remove();
        selected=null;
        highlightLayerUI();
        checkToolbar(); 
        updateLayers();
    }
}

// --- WRAPPING LOGIC ---
function applyWrapping() {
    if(wrappingItem) return; 
    itemCounter++;
    wrappingItem = document.createElement('img');
    wrappingItem.src = 'assets/wrapping/wrapping.png';
    wrappingItem.className = 'item';
    wrappingItem.dataset.id = 'wrap-' + itemCounter;
    wrappingItem.style.left = '50%';
    wrappingItem.style.top = '50%';
    wrappingItem.style.transform = 'translate(-50%, -50%) rotate(0deg) scaleX(1)';
    wrappingItem.style.width = '350px'; 
    wrappingItem.dataset.rotation = 0;
    wrappingItem.dataset.flip = 1;
    wrappingItem.dataset.op = 1;
    wrappingItem.style.zIndex = 10; 
    
    workspace.appendChild(wrappingItem);
    makeInteractive(wrappingItem);
    updateLayers();
    
    document.getElementById('wrap-start-ui').style.display = 'none';
    document.getElementById('wrap-confirm-ui').style.display = 'block';
}

function removeWrapping() {
    if(wrappingItem) {
        wrappingItem.remove();
        wrappingItem = null;
        updateLayers();
    }
    document.getElementById('wrap-start-ui').style.display = 'block';
    document.getElementById('wrap-confirm-ui').style.display = 'none';
}

// --- DRAGGABLE LAYERS ---
let dragSourceLayer = null;

function updateLayers(){
    const layersContainer = document.getElementById('layers');
    layersContainer.innerHTML = '';
    
    const items = Array.from(document.querySelectorAll('.item')).sort((a,b) => {
        return parseInt(b.style.zIndex || 0) - parseInt(a.style.zIndex || 0);
    });

    items.forEach((item, i) => {
        const d = document.createElement('div');
        d.className = 'layer-item';
        d.draggable = true;
        d.dataset.refId = item.dataset.id; 

        let label = '🌸 Flower / Leaf';
        if(item === wrappingItem) label = '📦 Wrapping Paper';
        else if (item.src.includes('accessories')) label = '🎀 Accessory';
        
        d.innerHTML = `<span>${label}</span> <span style="font-size:18px; cursor:grab;">≡</span>`;
        
        d.onclick = () => {
            if(document.body.classList.contains('preview-mode')) return;
            const targetItem = document.querySelector(`.item[data-id="${item.dataset.id}"]`);
            if(targetItem) {
                // Simulate click on mobile/desktop
                const event = new MouseEvent('mousedown');
                targetItem.dispatchEvent(event);
            }
        };

        d.addEventListener('dragstart', function(e) {
            dragSourceLayer = this;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
            this.style.opacity = '0.5';
        });
        d.addEventListener('dragover', function(e) { e.preventDefault(); return false; });
        d.addEventListener('dragend', function(e) { this.style.opacity = '1'; });
        d.addEventListener('drop', function(e) {
            e.stopPropagation();
            if (dragSourceLayer !== this) {
                const allNodes = Array.from(layersContainer.children);
                const fromIdx = allNodes.indexOf(dragSourceLayer);
                const toIdx = allNodes.indexOf(this);
                
                if (fromIdx < toIdx) this.after(dragSourceLayer);
                else this.before(dragSourceLayer);
                
                syncWorkspaceZIndex();
            }
            return false;
        });

        layersContainer.appendChild(d);
    });
    highlightLayerUI(); 
}

function syncWorkspaceZIndex() {
    const layerNodes = Array.from(document.getElementById('layers').children);
    let topZ = 1000; 
    layerNodes.forEach(node => {
        const refId = node.dataset.refId;
        const targetItem = document.querySelector(`.item[data-id="${refId}"]`);
        if(targetItem) targetItem.style.zIndex = topZ--;
    });
}

// --- FINALIZATION, RESET, & SAVE ---
function finishBouquet() {
    clearSelection();
    document.body.classList.add('preview-mode');
    document.getElementById('custom-message').style.display = 'block';
}

function editAgain() {
    document.body.classList.remove('preview-mode');
    document.getElementById('custom-message').style.display = 'none';
}

// Menghapus semua untuk buat buket baru
function startNewBouquet() {
    if(!confirm("Are you sure you want to clear this bouquet and start over?")) return;
    
    // Hapus semua bunga/item di canvas
    document.querySelectorAll('.item').forEach(item => item.remove());
    wrappingItem = null;
    itemCounter = 0;
    
    // Reset Teks
    document.getElementById('custom-message').innerHTML = '';
    
    // Update UI Layer dan Kembali ke step 1
    updateLayers();
    editAgain(); // Keluar dari preview mode
    goToStep('flowers');
    
    // Reset tombol wrapping
    document.getElementById('wrap-start-ui').style.display = 'block';
    document.getElementById('wrap-confirm-ui').style.display = 'none';
}

function saveAsImage() {
    const ws = document.getElementById('workspace');
    const customText = document.getElementById('custom-message');
    
    document.getElementById('final-actions').style.display = 'none';
    
    const originalBg = ws.style.background;
    ws.style.background = 'var(--bg-paper)'; 
    
    // Disable blinking cursor for capture
    customText.style.caretColor = 'transparent';

    html2canvas(ws, { 
        scale: 3, // Very high resolution for clean lines
        backgroundColor: '#F4EFE6',
        useCORS: true
    }).then(canvas => {
        document.getElementById('final-actions').style.display = 'flex';
        ws.style.background = originalBg;
        customText.style.caretColor = 'var(--vintage-brown)';

        const link = document.createElement('a');
        link.download = 'SeaBloom-Bouquet.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
